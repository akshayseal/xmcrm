services:
  - type: web
    name: school-outreach-crm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: HOST=0.0.0.0 python app.py
    healthCheckPath: /health
    envVars:
      - key: ADMIN_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/schoolcrm.sqlite3
    disk:
      name: school-crm-data
      mountPath: /var/data
      sizeGB: 1
